spring:
  application:
    name: memoreel-backend

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  jackson:
    property-naming-strategy: SNAKE_CASE
    default-property-inclusion: non_null

  servlet:
    multipart:
      max-file-size: 15MB
      max-request-size: 20MB

memoreel:
  llm:
    provider: stub
    claude:
      api-key: ${ANTHROPIC_API_KEY:}
      model: claude-sonnet-4-6
      max-tokens: 1024
      timeout-seconds: 30
      max-retries: 2
