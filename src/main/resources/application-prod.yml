spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/memoreel?serverTimezone=UTC&characterEncoding=UTF-8}
    username: ${DB_USERNAME:memoreel}
    password: ${DB_PASSWORD:memoreel}
    driver-class-name: ${DB_DRIVER:com.mysql.cj.jdbc.Driver}

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    show-sql: ${JPA_SHOW_SQL:true}
    properties:
      hibernate:
        format_sql: true

server:
  port: ${SERVER_PORT:8080}

memoreel:
  storage:
    s3:
      bucket: ${MEMOREEL_STORAGE_S3_BUCKET:memoreel-prod}
      region: ${MEMOREEL_STORAGE_S3_REGION:ap-northeast-2}
  llm:
    provider: claude
