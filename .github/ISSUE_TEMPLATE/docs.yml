name: 📚 문서 / 기타
description: 문서 작성·수정이나 기타 분류되지 않는 작업을 등록합니다.
title: "[Docs] "
labels: ["documentation"]
body:
  - type: markdown
    attributes:
      value: |
        문서 작업이나 기타 작업을 등록합니다.

  - type: textarea
    id: content
    attributes:
      label: 작업 내용
      description: 어떤 문서를 작성/수정하는지, 또는 어떤 기타 작업인지 적어주세요.
      placeholder: 예) README에 로컬 실행 방법(docker compose + bootRun) 추가
    validations:
      required: true

  - type: textarea
    id: target
    attributes:
      label: 대상
      description: 관련 문서나 파일 경로를 적어주세요.
      placeholder: 예) README.md, docs/setup.md
    validations:
      required: false

  - type: textarea
    id: refs
    attributes:
      label: 참고
      description: 관련 이슈, 링크 등을 적어주세요.
    validations:
      required: false
