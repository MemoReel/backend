name: 🐛 버그 리포트
description: 동작이 예상과 다른 문제를 보고합니다.
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        버그를 보고해 주셔서 감사합니다. 재현에 필요한 정보를 최대한 채워주세요.

  - type: textarea
    id: description
    attributes:
      label: 버그 설명
      description: 어떤 문제가 발생했는지 간단히 설명해 주세요.
      placeholder: 예) 메모 저장 시 500 에러가 발생합니다.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 재현 단계
      description: 문제를 재현하는 순서를 적어주세요.
      placeholder: |
        1. '...' 로 이동
        2. '...' 클릭
        3. '...' 입력
        4. 에러 발생
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 기대한 동작
      description: 원래 어떻게 동작해야 하는지 적어주세요.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 실제 동작
      description: 실제로 어떻게 동작했는지 적어주세요. (에러 로그/스택트레이스 포함)
      render: shell
    validations:
      required: false

  - type: textarea
    id: environment
    attributes:
      label: 환경
      description: 발생 환경 정보를 적어주세요.
      placeholder: |
        - OS: macOS 15.5
        - Java: 21
        - 브랜치/커밋: main @ abc1234
    validations:
      required: false

  - type: textarea
    id: extra
    attributes:
      label: 추가 정보
      description: 스크린샷, 참고 링크 등 도움이 될 내용을 자유롭게 적어주세요.
    validations:
      required: false
