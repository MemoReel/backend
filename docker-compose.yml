services:
  mysql:
    image: mysql:8.4
    container_name: memoreel-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: memoreel
      MYSQL_USER: memoreel
      MYSQL_PASSWORD: memoreel
      MYSQL_ROOT_PASSWORD: root
      TZ: UTC
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql-data:
